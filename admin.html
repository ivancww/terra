<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員發佈系統</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .form-container { max-width: 500px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #loadingMsg { text-align: center; color: #ff9900; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center; color: #007bff;">系統資料發佈</h2>
    
    <div class="form-group">
        <label>文件/新聞標題</label>
        <input type="text" id="fileTitle" placeholder="輸入標題...">
    </div>
    
    <div class="form-group">
        <label>主分類</label>
        <select id="mainSection" onchange="toggleSubCategory()">
            <option value="Memo">Memo</option>
            <option value="同事分享">同事分享</option>
            <option value="新聞">新聞 (可只入連結自動跳轉)</option>
            <option value="團隊培訓及會議記錄">團隊培訓及會議記錄</option>
            <option value="銷售工具">銷售工具</option>
        </select>
    </div>
    
    <div class="form-group" id="subCategoryGroup">
        <label>Memo 副分類</label>
        <select id="subCategory">
            <option value="推廣優惠">推廣優惠</option>
            <option value="公司獎賞">公司獎賞</option>
            <option value="公司會議">公司會議</option>
            <option value="產品更新資料">產品更新資料</option>
        </select>
    </div>

    <div class="form-group">
        <label>外部連結 (適用於新聞自動跳轉)</label>
        <input type="url" id="externalLink" placeholder="例如: https://yahoo.com">
    </div>
    
    <div class="form-group">
        <label>上載檔案 (如只有外部連結可留空)</label>
        <input type="file" id="fileUpload">
    </div>
    
    <button id="uploadBtn">即時發佈</button>
    <div id="loadingMsg">資料處理中，請稍候...</div>
</div>

<script>
    function toggleSubCategory() {
        const mainSection = document.getElementById('mainSection').value;
        document.getElementById('subCategoryGroup').style.display = mainSection === 'Memo' ? 'block' : 'none';
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCUUqWRecCdnKB7ReNLuSoiDZEs7q9oSJ4",
        authDomain: "terra-team.firebaseapp.com",
        projectId: "terra-team",
        storageBucket: "terra-team.firebasestorage.app",
        messagingSenderId: "781876962987",
        appId: "1:781876962987:web:33c1f7ae868fc3454779ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const title = document.getElementById('fileTitle').value.trim();
        const mainSection = document.getElementById('mainSection').value;
        const subCategory = mainSection === 'Memo' ? document.getElementById('subCategory').value : "";
        const externalLink = document.getElementById('externalLink').value.trim();
        const fileInput = document.getElementById('fileUpload');
        const file = fileInput.files[0];
        
        if(!title) { alert('請填寫標題！'); return; }
        if(!file && !externalLink) { alert('請選擇檔案上載或輸入外部連結！'); return; }

        document.getElementById('uploadBtn').disabled = true;
        document.getElementById('loadingMsg').style.display = 'block';

        try {
            let downloadURL = "";
            if (file) {
                const storageRef = ref(storage, 'team_files/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                downloadURL = await getDownloadURL(storageRef);
            }

            const today = new Date();
            const uploadMonth = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0');

            await addDoc(collection(db, "team_documents"), {
                title: title,
                mainSection: mainSection,
                subCategory: subCategory,
                fileUrl: downloadURL,
                externalLink: externalLink,
                uploadMonth: uploadMonth,
                createdAt: today
            });

            alert('🎉 發佈成功！');
            location.reload();
        } catch (error) {
            console.error("發佈錯誤: ", error);
            alert('發佈失敗，請檢查權限或網絡。');
        } finally {
            document.getElementById('uploadBtn').disabled = false;
            document.getElementById('loadingMsg').style.display = 'none';
        }
    });
</script>
</body>
</html>
