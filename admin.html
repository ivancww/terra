<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra資源系統 - 管理員後台 v2.0.0</title>
    <style>
        :root { --brand-color: #0d1b2a; --bg-color: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: var(--brand-color); text-align: center; border-bottom: 2px solid var(--brand-color); padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input[type="text"], input[type="url"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { background: var(--brand-color); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1a365d; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ 上載新資源 (v1.9.0 更新版)</h2>
    
    <form id="uploadForm">
        <div class="form-group">
            <label>1. 選擇主分類</label>
            <select id="section" required onchange="toggleSubCategory()">
                <option value="Memo">📝 Memo</option>
                <option value="新聞">📰 新聞通告</option>
                <option value="分享">🗣️ 同事分享</option>
                <option value="區會議">🗓️ 區會議記錄</option>
                <option value="區活動">🎉 區活動花絮</option>
                <option value="銷售工具">💼 銷售工具</option>
            </select>
        </div>

        <div class="form-group" id="subCategoryGroup">
            <label>2. 選擇 Memo 副分類</label>
            <select id="subCategory">
                <option value="" disabled selected>請選擇副分類</option>
                <option value="推廣優惠">推廣優惠</option>
                <option value="公司獎賞">公司獎賞</option>
                <option value="公司會議">公司會議</option>
                <option value="產品更新資料">產品更新資料</option>
                <option value="核保">核保</option>
                <option value="招募">招募</option>
                <option value="保單服務">保單服務</option>
            </select>
        </div>

        <div class="form-group">
            <label>3. 標題名稱</label>
            <input type="text" id="title" placeholder="例如：2026年3月份核保指引" required>
        </div>

        <div class="form-group">
            <label>4. 歸屬月份</label>
            <select id="uploadMonth" required>
                <option value="" disabled selected>請選擇月份</option>
            </select>
        </div>

        <div class="form-group">
            <label>5. 檔案連結 (Google Drive / OneDrive / PDF 網址)</label>
            <input type="url" id="url" placeholder="https://" required>
        </div>

        <button type="submit" class="btn" id="submitBtn">確認發佈</button>
        <div id="statusMsg"></div>
    </form>

    <a href="./index.html" class="back-link">返回前台主頁</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Firebase 設定
    const app = initializeApp({
        apiKey: "AIzaSyCUUqWRecCdnKB7ReNLuSoiDZEs7q9oSJ4",
        authDomain: "terra-team.firebaseapp.com",
        projectId: "terra-team",
        storageBucket: "terra-team.firebasestorage.app",
        appId: "1:781876962987:web:33c1f7ae868fc3454779ee"
    });

    const db = getFirestore(app);

    // 動態生成月份清單 (過去 12 個月至未來 2 個月)
    const monthSelect = document.getElementById('uploadMonth');
    const today = new Date();
    for (let i = -2; i <= 12; i++) {
        const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const monthStr = `${yyyy}年${mm}月`;
        monthSelect.innerHTML += `<option value="${monthStr}">${monthStr}</option>`;
    }

    // 控制副分類顯示與否
    window.toggleSubCategory = function() {
        const section = document.getElementById('section').value;
        const subGroup = document.getElementById('subCategoryGroup');
        const subCat = document.getElementById('subCategory');
        
        if (section === 'Memo') {
            subGroup.style.display = 'block';
            subCat.setAttribute('required', 'true');
        } else {
            subGroup.style.display = 'none';
            subCat.removeAttribute('required');
            subCat.value = ""; 
        }
    }

    // 處理表單提交
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        
        const section = document.getElementById('section').value;
        const subCategory = document.getElementById('subCategory').value;
        const title = document.getElementById('title').value;
        const uploadMonth = document.getElementById('uploadMonth').value;
        const url = document.getElementById('url').value;

        submitBtn.disabled = true;
        submitBtn.innerText = "發佈中，請稍候...";
        statusMsg.innerText = "";

        try {
            await addDoc(collection(db, "data"), {
                section: section,
                subCategory: section === 'Memo' ? subCategory : "",
                title: title,
                uploadMonth: uploadMonth,
                url: url,
                createdAt: serverTimestamp()
            });

            statusMsg.style.color = "green";
            statusMsg.innerText = "✅ 發佈成功！前台已即時同步更新。";
            document.getElementById('uploadForm').reset();
            toggleSubCategory(); // 重置顯示狀態

        } catch (error) {
            console.error("Error adding document: ", error);
            statusMsg.style.color = "red";
            statusMsg.innerText = "❌ 發佈失敗，請檢查網絡連線或聯絡管理員。";
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "確認發佈";
        }
    });

    // 初始化執行一次檢查
    toggleSubCategory();
</script>

</body>
</html>
